; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = ./boards


[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board = esp32s3
monitor_speed = 115200
build_type = debug
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

; Das LittleFS-Image wird aus dem webserver-Ordner gebaut
; WICHTIG: Zwei Scripts:
;   1. pre:littlefs_datadir.py - setzt PROJECT_DATA_DIR VOR Platform-Init
;   2. littlefs_setup.py - setzt MKFSTOOL NACH Platform-Init (für Windows mklittlefs.exe)
extra_scripts = 
    pre:scripts/littlefs_datadir.py
    scripts/littlefs_setup.py

upload_port = COM4
monitor_port = COM4
monitor_filters = esp32_exception_decoder, log2file

lib_deps =
  Adafruit NeoPixel
  moononournation/GFX Library for Arduino@1.6.3
  lvgl@^8.3.11

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -D LV_CONF_PATH="${PROJECT_DIR}/include/lv_conf.h"
